<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Contacto</title><link rel="stylesheet" href="/styles.css"><script src="/app.js"></script></head><body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/login">Login</a><a href="/admin">Admin</a></nav></header><main>
<div class="panel"><h1>Contacto por WhatsApp</h1><p>Producto: <strong th:text="${producto.nombre}">Producto</strong></p><form method="post" action="/contacto/mensaje"><input type="hidden" name="productoId" th:value="${producto.id}"><label>Nombre del cliente</label><input name="nombreCliente"><label>Cantidad</label><input name="cantidad" type="number" value="1"><button class="btn">Generar mensaje</button></form><div th:if="${mensaje}" class="alert"><strong>Mensaje generado:</strong><p id="mensajeGenerado" th:text="${mensaje}">Mensaje</p><button class="btn alt" onclick="copiarMensaje()">Copiar mensaje</button></div></div>
</main></body></html>
