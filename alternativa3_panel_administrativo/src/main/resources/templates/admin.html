<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Admin</title><link rel="stylesheet" href="/styles.css"></head>
<body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/admin">Admin</a></nav></header>
<main><div class="panel"><h1>Panel administrativo</h1><form method="post" action="/admin/productos"><input name="nombre" placeholder="Nombre"><input name="marca" placeholder="Marca"><select name="categoria"><option>Masculino</option><option>Femenino</option><option>Unisex</option></select><input name="precio" type="number" placeholder="Precio"><textarea name="descripcion" placeholder="Descripción"></textarea><button class="btn">Registrar</button></form></div>
<div class="panel" style="margin-top:18px"><table><tr><th>ID</th><th>Nombre</th><th>Marca</th><th>Precio</th><th>Acción</th></tr><tr th:each="p:${productos}"><td th:text="${p.id}"></td><td th:text="${p.nombre}"></td><td th:text="${p.marca}"></td><td th:text="${p.precio}"></td><td><form th:action="@{/admin/productos/{id}/eliminar(id=${p.id})}" method="post"><button class="btn alt">Eliminar</button></form></td></tr></table></div></main></body></html>
