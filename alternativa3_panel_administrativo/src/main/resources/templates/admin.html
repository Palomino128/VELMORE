<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Admin</title><link rel="stylesheet" href="/styles.css"></head><body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/login">Login</a><a href="/admin">Admin</a></nav></header><main>
<div class="grid"><div class="card"><h3>Productos</h3><div class="price" th:text="${totalProductos}">0</div></div><div class="card"><h3>Categorías</h3><div class="price" th:text="${totalCategorias}">0</div></div><div class="card"><h3>Valor inventario</h3><div class="price" th:text="${'S/ ' + #numbers.formatDecimal(valorInventario,1,2)}">0</div></div></div>
<div th:if="${error}" class="alert error" th:text="${error}"></div>
<section class="panel" style="margin-top:18px"><h1>Panel administrativo</h1><form method="post" action="/admin/productos"><label>Nombre</label><input name="nombre"><label>Marca</label><input name="marca"><label>Categoría</label><select name="categoria"><option th:each="c:${categorias}" th:value="${c}" th:text="${c.etiqueta}"></option></select><label>Precio</label><input name="precio" type="number"><label>Stock</label><input name="stock" type="number"><label>Descripción</label><textarea name="descripcion"></textarea><button class="btn">Registrar producto</button></form></section>
<section class="panel" style="margin-top:18px"><h2>Listado completo de productos</h2><table><thead><tr><th>ID</th><th>Producto</th><th>Marca</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acción</th></tr></thead><tbody><tr th:each="p:${productos}"><td th:text="${p.id}"></td><td th:text="${p.nombre}"></td><td th:text="${p.marca}"></td><td th:text="${p.categoria.etiqueta}"></td><td th:text="${p.precio}"></td><td th:text="${p.stock}"></td><td><form th:action="@{/admin/productos/{id}/eliminar(id=${p.id})}" method="post"><button class="btn danger">Eliminar</button></form></td></tr></tbody></table></section>
</main></body></html>
