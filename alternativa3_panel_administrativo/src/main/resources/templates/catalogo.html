<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Catálogo</title><link rel="stylesheet" href="/styles.css"></head><body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/login">Login</a><a href="/admin">Admin</a></nav></header><main>
<section class="panel"><h1>Catálogo de perfumes</h1><form class="filters" method="get" action="/catalogo"><div><label>Buscar</label><input name="texto" placeholder="Nombre o marca" th:value="${filtro.texto}"></div><div><label>Categoría</label><select name="categoria"><option value="">Todas</option><option th:each="c:${categorias}" th:value="${c}" th:text="${c.etiqueta}"></option></select></div><div><button class="btn">Buscar</button></div></form></section>
<div class="grid"><div class="card" th:each="p:${productos}"><div class="img" th:text="${p.nombre}">Producto</div><h3 th:text="${p.nombre}">Nombre</h3><p th:text="${p.marca + ' · ' + p.categoria.etiqueta}">Marca</p><div class="price" th:text="${'S/ ' + p.precio}">Precio</div><a class="btn" th:href="@{/producto/{id}(id=${p.id})}">Ver detalle</a></div></div>
</main></body></html>
