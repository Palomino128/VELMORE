<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Catálogo</title><link rel="stylesheet" href="/styles.css"></head>
<body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/admin">Admin</a></nav></header>
<main><div class="panel"><h1>Catálogo de perfumes</h1><form><input name="q" placeholder="Buscar perfume o marca"><select name="categoria"><option value="">Todas</option><option>Masculino</option><option>Femenino</option><option>Unisex</option></select><button class="btn">Buscar</button></form></div>
<div class="grid"><div class="card" th:each="p:${productos}"><div class="img" th:text="${p.nombre}">Perfume</div><h3 th:text="${p.nombre}">Nombre</h3><p th:text="${p.marca + ' · ' + p.categoria}">Marca</p><div class="price" th:text="${'S/ ' + p.precio}">Precio</div><a class="btn" th:href="@{/producto/{id}(id=${p.id})}">Ver detalle</a></div></div></main></body></html>
