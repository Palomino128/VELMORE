<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Admin</title><link rel="stylesheet" href="/styles.css"><script src="/app.js"></script></head><body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/login">Login</a><a href="/admin">Admin</a><a href="/logout">Salir</a></nav></header><main>
<div class="kpis"><div class="kpi"><small>Productos</small><strong th:text="${totalProductos}">0</strong></div><div class="kpi"><small>Categorías</small><strong th:text="${totalCategorias}">0</strong></div><div class="kpi"><small>Inventario</small><strong th:text="${'S/ ' + #numbers.formatDecimal(valorInventario,1,2)}">S/ 0</strong></div></div>
<div th:if="${error}" class="alert error" th:text="${error}"></div><section class="panel"><h1>Panel administrativo</h1><a class="btn alt" href="/reporte/productos">Descargar reporte Excel</a><form method="post" action="/admin/productos"><label>Nombre</label><input name="nombre"><label>Marca</label><input name="marca"><label>Categoría</label><select name="categoria"><option th:each="c:${categorias}" th:value="${c}" th:text="${c.etiqueta}"></option></select><label>Precio</label><input name="precio" type="number"><label>Stock</label><input name="stock" type="number"><label>Descripción</label><textarea name="descripcion"></textarea><button class="btn">Registrar</button></form></section>
<section class="panel" style="margin-top:18px"><h2>Productos</h2><table><thead><tr><th>ID</th><th>Producto</th><th>Marca</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acción</th></tr></thead><tbody><tr th:each="p:${productos}"><td th:text="${p.id}"></td><td th:text="${p.nombre}"></td><td th:text="${p.marca}"></td><td th:text="${p.categoria.etiqueta}"></td><td th:text="${p.precio}"></td><td th:text="${p.stock}"></td><td><form th:action="@{/admin/productos/{id}/eliminar(id=${p.id})}" method="post" onsubmit="return confirmarEliminacion()"><button class="btn danger">Eliminar</button></form></td></tr></tbody></table></section>
</main></body></html>
