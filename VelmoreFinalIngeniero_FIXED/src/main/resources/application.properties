server.port=8081
spring.application.name=VelmoreFinalIngeniero

# Credenciales de administrador configurables por variable de entorno.
# En desarrollo usa estos valores; en producción se recomienda VELMORE_ADMIN_USER y VELMORE_ADMIN_PASSWORD.
app.admin.usuario=${VELMORE_ADMIN_USER:admin}
app.admin.clave=${VELMORE_ADMIN_PASSWORD:Velmore2024$}

# Seguridad básica de sesión
server.servlet.session.timeout=20m
server.error.include-message=never
server.error.include-stacktrace=never
velmore.whatsapp.numero=51999999999
