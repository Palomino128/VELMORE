<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar producto – VELMORE</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <div class="logo">VELMORE</div>
  <nav>
    <a href="/">Inicio</a>
    <a href="/catalogo">Catálogo</a><a href="/carrito">Carrito</a>
    <a href="/admin">Admin</a>
    <a href="/logout">Salir</a>
  </nav>
</header>
<main>
  <section class="panel" style="max-width:600px">
    <h1>Editar producto</h1>
    <p class="sub">Modifique los datos y guarde los cambios.</p>

    <div th:if="${error}" class="alert error" th:text="${error}"></div>

    <form method="post" th:action="@{/admin/productos/{id}/editar(id=${producto.id})}">
      <label>Nombre</label>
      <input name="nombre" th:value="${producto.nombre}" required>

      <label>Marca</label>
      <input name="marca" th:value="${producto.marca}" required>

      <label>Categoría</label>
      <select name="categoria">
        <option th:each="c : ${categorias}"
                th:value="${c}"
                th:text="${c.etiqueta}"
                th:selected="${c == producto.categoria}">
        </option>
      </select>

      <label>Precio (S/)</label>
      <input name="precio" type="number" step="0.01" min="0.01"
             th:value="${producto.precio}" required>

      <label>Stock</label>
      <input name="stock" type="number" min="0"
             th:value="${producto.stock}" required>

      <label>Descripción</label>
      <textarea name="descripcion" maxlength="300"
                th:text="${producto.descripcion}"></textarea>

      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn">Guardar cambios</button>
        <a class="btn alt" href="/admin">Cancelar</a>
      </div>
    </form>
  </section>
</main>
</body>
</html>
