<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Detalle</title><link rel="stylesheet" href="/styles.css"></head><body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/carrito">Carrito</a><a href="/login">Login</a><a href="/admin">Admin</a><a href="/logout">Salir</a></nav></header><main>
<section class="split panel"><img class="product-img big" th:src="@{/img/productos/{img}.png(img=${producto.imagen})}" th:alt="${producto.nombre}"><div><span class="badge" th:text="${producto.categoria.etiqueta}">Categoría</span><h1 th:text="${producto.nombre}">Producto</h1><p class="sub" th:text="${producto.marca}">Marca</p><p th:text="${producto.descripcion}">Descripción</p><p>Stock: <strong th:text="${producto.stock}">0</strong></p><div class="price" th:text="${'S/ ' + producto.precio}">S/ 0</div><a class="btn alt" href="/carrito">Agregar más productos</a><a class="btn" th:href="@{/contacto/{id}(id=${producto.id})}">Contactar</a></div></section>
</main></body></html>
