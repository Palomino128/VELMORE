<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Catálogo</title><link rel="stylesheet" href="/styles.css"></head><body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/carrito">Carrito</a><a href="/login">Login</a><a href="/admin">Admin</a><a href="/logout">Salir</a></nav></header><main>
<section class="panel"><h1>Catálogo</h1><form class="filters" method="get" action="/catalogo"><div><label>Buscar</label><input name="texto" th:value="${filtro.texto}" placeholder="Khamrah, Lattafa"></div><div><label>Categoría</label><select name="categoria"><option value="">Todas</option><option th:each="c:${categorias}" th:value="${c}" th:text="${c.etiqueta}"></option></select></div><div><button class="btn">Buscar</button></div></form><a class="btn alt" href="/carrito">Seleccionar varios productos</a></section>
<div class="grid"><div class="card" th:each="p:${productos}"><img class="product-img" th:src="@{/img/productos/{img}.png(img=${p.imagen})}" th:alt="${p.nombre}"><h3 th:text="${p.nombre}">Nombre</h3><p class="sub" th:text="${p.marca + ' · ' + p.categoria.etiqueta}">Marca</p><p>Stock: <strong th:text="${p.stock}">0</strong></p><div class="price" th:text="${'S/ ' + p.precio}">S/ 0</div><a class="btn" th:href="@{/producto/{id}(id=${p.id})}">Ver detalle</a></div></div>
</main></body></html>
