server.port=8081
spring.application.name=VelmoreFinalIngeniero

# ============================================================
#  BASE DE DATOS - MySQL via XAMPP
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/velmore_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Ejecuta src/main/resources/data.sql al arrancar (inserta los 8 perfumes iniciales)
spring.sql.init.mode=always
# JPA debe crear/actualizar tablas ANTES de que data.sql se ejecute
spring.jpa.defer-datasource-initialization=true

# ============================================================
#  CREDENCIALES ADMIN
# ============================================================
app.admin.usuario=${VELMORE_ADMIN_USER:admin}
app.admin.clave=${VELMORE_ADMIN_PASSWORD:Velmore2024$}

# ============================================================
#  SEGURIDAD DE SESION
# ============================================================
server.servlet.session.timeout=20m
server.error.include-message=never
server.error.include-stacktrace=never

velmore.whatsapp.numero=51999999999
