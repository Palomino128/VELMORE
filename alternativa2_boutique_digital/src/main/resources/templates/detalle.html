<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Detalle</title><link rel="stylesheet" href="/styles.css"></head><body><header><div class="logo">VELMORE</div><nav><a href="/">Inicio</a><a href="/catalogo">Catálogo</a><a href="/login">Login</a><a href="/admin">Admin</a></nav></header><main>
<div class="split panel"><div class="img" th:text="${producto.nombre}">Producto</div><div><h1 th:text="${producto.nombre}">Producto</h1><p th:text="${producto.marca + ' · ' + producto.categoria.etiqueta}">Marca</p><p th:text="${producto.descripcion}">Descripción</p><p>Stock: <strong th:text="${producto.stock}">0</strong></p><div class="price" th:text="${'S/ ' + producto.precio}">Precio</div><a class="btn" th:href="@{/contacto/{id}(id=${producto.id})}">Contactar</a><a class="btn alt" href="/catalogo">Volver</a></div></div>
</main></body></html>
